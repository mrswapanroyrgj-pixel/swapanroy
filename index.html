<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Auto Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 25px 80px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 450px; 
        }
        h1 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 8px; 
            font-size: 28px; 
        }
        .subtitle { 
            text-align: center; 
            color: #888; 
            margin-bottom: 30px; 
            font-size: 14px; 
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 6px; 
            color: #444; 
            font-weight: 600; 
            font-size: 14px; 
        }
        input, select { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid #e8e8e8; 
            border-radius: 10px; 
            font-size: 15px; 
            transition: all 0.3s; 
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: #667eea; 
        }
        .price-box { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            margin: 25px 0; 
        }
        .price-label { 
            font-size: 14px; 
            opacity: 0.9; 
            margin-bottom: 5px; 
        }
        .price-value { 
            font-size: 32px; 
            font-weight: bold; 
        }
        button { 
            width: 100%; 
            padding: 16px; 
            background: #333; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s; 
        }
        button:hover:not(:disabled) { 
            background: #555; 
            transform: translateY(-2px); 
        }
        button:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
        }
        .message { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            font-size: 14px; 
            display: none; 
        }
        .success { 
            background: #d4edda; 
            color: #155724; 
            border: 1px solid #c3e6cb; 
        }
        .error { 
            background: #f8d7da; 
            color: #721c24; 
            border: 1px solid #f5c6cb; 
        }
        .spinner { 
            display: inline-block; 
            width: 18px; 
            height: 18px; 
            border: 2px solid #fff; 
            border-top-color: transparent; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
            margin-right: 8px; 
            vertical-align: middle; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 My Auto Store</h1>
        <p class="subtitle">Automatic Order System</p>
        
        <form id="orderForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" required placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>
            
            <div class="form-group">
                <label for="product">Select Product *</label>
                <select id="product" required>
                    <option value="">-- Choose Product --</option>
                    <option value="Product A" data-price="500">Product A — ৳500</option>
                    <option value="Product B" data-price="1000">Product B — ৳1000</option>
                    <option value="Product C" data-price="1500">Product C — ৳1500</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="quantity">Quantity *</label>
                <input type="number" id="quantity" min="1" value="1" required>
            </div>
            
            <div class="price-box">
                <div class="price-label">Total Amount</div>
                <div class="price-value">৳<<span id="totalPrice">0</span></div>
            </div>
            
            <button type="submit" id="submitBtn">
                Place Order
            </button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        // ⚠️⚠️⚠️ এখানে আপনার Google Apps Script URL বসান ⚠️⚠️⚠️
        const API_URL = 'https://script.google.com/macros/s/AKfycbzAyjb942TJW0PVnKfgm0RyJIYZDT6HtQ-6GP0KhGMBkydAjvq580lIuEOLbGO_G4jb5Q/exec';
        
        const productSelect = document.getElementById('product');
        const quantityInput = document.getElementById('quantity');
        const totalPriceEl = document.getElementById('totalPrice');
        const form = document.getElementById('orderForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageEl = document.getElementById('message');
        
        function calculateTotal() {
            const option = productSelect.options[productSelect.selectedIndex];
            const price = parseInt(option.dataset.price) || 0;
            const qty = parseInt(quantityInput.value) || 0;
            totalPriceEl.textContent = (price * qty).toLocaleString();
        }
        
        productSelect.addEventListener('change', calculateTotal);
        quantityInput.addEventListener('input', calculateTotal);
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                product: productSelect.value,
                quantity: parseInt(quantityInput.value)
            };
            
            // UI Loading State
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Processing...';
            messageEl.style.display = 'none';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                // Since no-cors doesn't return readable response, we assume success
                messageEl.className = 'message success';
                messageEl.innerHTML = '✅ <strong>Order placed successfully!</strong><br>Check your email for confirmation.';
                messageEl.style.display = 'block';
                
                form.reset();
                totalPriceEl.textContent = '0';
                
            } catch (error) {
                messageEl.className = 'message error';
                messageEl.innerHTML = '❌ <strong>Error:</strong> ' + error.message;
                messageEl.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Place Order';
            }
        });
    </script>
</body>
</html>
